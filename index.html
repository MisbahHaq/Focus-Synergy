<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Invoice Generator</title>
    <style>
      * {
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #f8fafc;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      .editor-container {
        width: 35%;
        min-width: 360px;
        background-color: #ffffff;
        padding: 30px;
        border-right: 1px solid #e2e8f0;
        overflow-y: auto;
        z-index: 10;
      }

      .preview-container {
        width: 65%;
        padding: 40px;
        overflow-y: auto;
        display: flex;
        justify-content: center;
        background-color: #f1f5f9;
      }

      .editor-container h2 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 24px;
      }

      .editor-container h3 {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #64748b;
        margin: 28px 0 16px 0;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-row-two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: #475569;
        font-size: 0.8rem;
        font-weight: 500;
      }

      input[type="text"],
      input[type="number"],
      input[type="file"] {
        width: 100%;
        padding: 8px 12px;
        background-color: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 0.875rem;
        color: #334155;
        transition: all 0.2s;
      }

      input:focus {
        background-color: #fff;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        outline: none;
      }

      .item-block,
      .slip-block {
        position: relative;
        padding-bottom: 16px;
        margin-bottom: 16px;
        border-bottom: 1px dashed #e2e8f0;
      }

      .row-inputs {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr 2fr;
        gap: 10px;
        margin-bottom: 10px;
      }

      .tax-inputs {
        display: grid;
        grid-template-columns: 3.5fr 1.5fr;
        gap: 8px;
      }

      .btn-link {
        background: none;
        border: none;
        color: #3b82f6;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        padding: 4px 0;
        display: inline-flex;
        align-items: center;
        transition: color 0.15s;
      }

      .btn-link:hover {
        color: #2563eb;
        text-decoration: underline;
      }

      .btn-primary {
        background-color: #3b82f6;
        color: white;
        border: none;
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.15s;
        text-align: center;
        width: 100%;
      }

      .btn-primary:hover {
        background-color: #2563eb;
      }

      .btn-danger {
        position: absolute;
        right: -8px;
        top: -8px;
        background: #ef4444;
        color: white;
        border: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        font-size: 10px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .item-block:hover .btn-danger,
      .slip-block:hover .btn-danger {
        opacity: 1;
      }

      .invoice-box {
        width: 100%;
        max-width: 800px;
        background-color: #faf8f5;
        padding: 50px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        color: #111;
        min-height: 297mm;
      }

      .invoice-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 30px;
      }

      .logo-placeholder {
        width: 150px;
        height: auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-placeholder img {
        width: 100%;
        height: auto;
        object-fit: contain;
      }

      .invoice-title {
        font-size: 3.5rem;
        font-family: "Times New Roman", Times, serif;
        font-weight: 500;
        letter-spacing: -1px;
        line-height: 1;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
        font-size: 1.1rem;
        text-transform: uppercase;
      }

      .divider {
        border-top: 2px solid #000;
        margin: 15px 0;
      }

      .invoice-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      .invoice-table th {
        text-align: left;
        font-weight: bold;
        font-size: 0.85rem;
        padding: 12px 5px;
      }

      .invoice-table td {
        padding: 12px 5px;
        font-size: 0.8rem;
        vertical-align: middle;
      }

      .invoice-table tr {
        border-bottom: 1px solid #000;
      }

      .invoice-table th:nth-child(n + 3),
      .invoice-table td:nth-child(n + 3) {
        text-align: right;
      }

      .grand-total-section {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        margin: 40px 0;
        font-size: 1.6rem;
        font-weight: bold;
      }

      .grand-total-label {
        margin-right: 120px;
        font-size: 1.8rem;
      }

      .bank-section-title {
        font-size: 1.2rem;
        font-weight: normal;
        margin-bottom: 25px;
      }

      .slips-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        margin-bottom: 60px;
      }

      .slip-image-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        max-height: 320px;
        overflow: hidden;
        padding: 0;
      }

      .slip-image-wrapper img {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }

      .footer-thankyou {
        font-size: 1.2rem;
        margin-top: 40px;
      }

      .footer-line {
        border-top: 1px dashed #000;
        width: 250px;
        float: right;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="editor-container">
      <h2>Invoice Configurator</h2>
      <div class="form-row-two">
        <div class="form-group">
          <label>Vendor / Asset</label>
          <input
            type="text"
            id="inputAsset"
            value="UNITY ASSET"
            oninput="updateInvoice()"
          />
        </div>
        <div class="form-group">
          <label>Invoice Date</label>
          <input
            type="text"
            id="inputDate"
            value="23 June 2026"
            oninput="updateInvoice()"
          />
        </div>
      </div>

      <h3>Line Items</h3>
      <div id="itemsContainer">
        <div class="item-block">
          <button
            class="btn btn-danger"
            onclick="
              this.parentElement.remove();
              updateInvoice();
            "
          >
            &times;
          </button>
          <div class="row-inputs">
            <input
              type="text"
              placeholder="Item Name"
              class="item-name"
              value="Microsoft 360"
              oninput="updateInvoice()"
            />
            <input
              type="text"
              placeholder="DD-MM-YYYY"
              class="item-date"
              value="23-06-2026"
              oninput="updateInvoice()"
            />
            <input
              type="number"
              placeholder="Qty"
              class="item-qty"
              value="14"
              oninput="updateInvoice()"
            />
            <input
              type="number"
              placeholder="$/Unit"
              class="item-price"
              value="4"
              oninput="updateInvoice()"
            />
            <input
              type="text"
              placeholder="PKR Total"
              class="item-pkr"
              value="16,212.68"
              oninput="updateInvoice()"
            />
          </div>
          <div class="tax-inputs">
            <input
              type="text"
              placeholder="Tax Line Label"
              class="tax-name"
              value="Tax"
              oninput="updateInvoice()"
            />
            <input
              type="text"
              placeholder="Tax PKR"
              class="tax-pkr"
              value="810.63"
              oninput="updateInvoice()"
            />
          </div>
        </div>
      </div>
      <button class="btn-link" onclick="addItemRow()">
        + Add Product Item
      </button>

      <div class="form-group" style="margin-top: 24px">
        <label>Grand Total Display</label>
        <input type="text" id="inputGrandTotal" readonly />
      </div>

      <h3>Bank Transaction Images</h3>
      <div id="slipsContainer"></div>
      <button class="btn-link" onclick="addSlipRow()">+ Add Slip Image</button>

      <div style="margin-top: 30px">
        <button class="btn-primary" onclick="downloadAsPNG()">
          Download Invoice as PNG
        </button>
      </div>
    </div>

    <div class="preview-container">
      <div class="invoice-box">
        <div class="invoice-header">
          <div class="logo-placeholder">
            <img
              src="TLL-LOGO_NEW1.png"
              alt="The Location Lab"
              onerror="
                this.style.display = 'none';
                this.parentElement.innerText = 'TLL Logo Missing';
              "
            />
          </div>
          <div class="invoice-title">INVOICE</div>
        </div>

        <div class="meta-row">
          <span id="previewAsset">UNITY ASSET</span>
          <span id="previewDate">23 June 2026</span>
        </div>

        <div class="divider"></div>

        <table class="invoice-table">
          <thead>
            <tr>
              <th style="width: 25%">Item</th>
              <th style="width: 20%">Date</th>
              <th style="width: 12%">Quantity</th>
              <th style="width: 13%">Unit Price</th>
              <th style="width: 15%">Total Amount</th>
              <th style="width: 15%">Total</th>
            </tr>
          </thead>
          <tbody id="previewTableBody"></tbody>
        </table>

        <div class="grand-total-section">
          <span class="grand-total-label">Total</span>
          <span id="previewGrandTotal">20,671.16</span>
        </div>

        <div class="bank-transactions">
          <h4 class="bank-section-title">Bank Transactions:</h4>
          <div class="slips-grid" id="previewSlipsGrid"></div>
        </div>

        <div class="footer-thankyou">
          Thank you!
          <div class="footer-line"></div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      function downloadAsPNG() {
        const invoiceBox = document.querySelector(".invoice-box");
        if (!invoiceBox) {
          alert("Invoice capture region target missing");
          return;
        }

        html2canvas(invoiceBox, { scale: 2, useCORS: true })
          .then(function (canvas) {
            var imgData = canvas.toDataURL("image/png");
            var downloadLink = document.createElement("a");
            var assetName = document
              .getElementById("inputAsset")
              .value.replace(/[^a-z0-9]/gi, "_")
              .toLowerCase();

            downloadLink.href = imgData;
            downloadLink.download = "invoice_" + assetName + ".png";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
          })
          .catch(function (err) {
            alert("Error rendering image asset: " + err.message);
          });
      }

      function addItemRow() {
        var container = document.getElementById("itemsContainer");
        var newBlock = document.createElement("div");
        newBlock.className = "item-block";

        var innerHTMLStr = "";
        innerHTMLStr +=
          '<button class="btn btn-danger" onclick="this.parentElement.remove(); updateInvoice();">&times;</button>';
        innerHTMLStr += '<div class="row-inputs">';
        innerHTMLStr +=
          '  <input type="text" placeholder="Item Name" class="item-name" value="Microsoft 360" oninput="updateInvoice()">';
        innerHTMLStr +=
          '  <input type="text" placeholder="DD-MM-YYYY" class="item-date" value="23-06-2026" oninput="updateInvoice()">';
        innerHTMLStr +=
          '  <input type="number" placeholder="Qty" class="item-qty" value="1" oninput="updateInvoice()">';
        innerHTMLStr +=
          '  <input type="number" placeholder="$/Unit" class="item-price" value="0" oninput="updateInvoice()">';
        innerHTMLStr +=
          '  <input type="text" placeholder="PKR Total" class="item-pkr" value="0.00" oninput="updateInvoice()">';
        innerHTMLStr += "</div>";
        innerHTMLStr += '<div class="tax-inputs">';
        innerHTMLStr +=
          '  <input type="text" placeholder="Tax Line Label" class="tax-name" value="Tax" oninput="updateInvoice()">';
        innerHTMLStr +=
          '  <input type="text" placeholder="Tax PKR" class="tax-pkr" value="0.00" oninput="updateInvoice()">';
        innerHTMLStr += "</div>";

        newBlock.innerHTML = innerHTMLStr;
        container.appendChild(newBlock);
        updateInvoice();
      }

      function addSlipRow() {
        var container = document.getElementById("slipsContainer");
        var newBlock = document.createElement("div");
        newBlock.className = "slip-block";

        var innerHTMLStr = "";
        innerHTMLStr +=
          '<button class="btn btn-danger" onclick="this.parentElement.remove(); updateInvoice();">&times;</button>';
        innerHTMLStr += "<label>Upload Slip Image File</label>";
        innerHTMLStr +=
          '<input type="file" class="slip-file" accept="image/*" onchange="updateInvoice()">';

        newBlock.innerHTML = innerHTMLStr;
        container.appendChild(newBlock);
      }

      function updateInvoice() {
        document.getElementById("previewAsset").innerText =
          document.getElementById("inputAsset").value;
        document.getElementById("previewDate").innerText =
          document.getElementById("inputDate").value;

        var itemNames = document.getElementsByClassName("item-name");
        var itemDates = document.getElementsByClassName("item-date");
        var itemQtys = document.getElementsByClassName("item-qty");
        var itemPrices = document.getElementsByClassName("item-price");
        var itemPkrs = document.getElementsByClassName("item-pkr");
        var taxNames = document.getElementsByClassName("tax-name");
        var taxPkrs = document.getElementsByClassName("tax-pkr");

        var grandTotal = 0;
        var tableHTML = "";

        for (var i = 0; i < itemNames.length; i++) {
          var pkr = parseFloat(itemPkrs[i].value.replace(/,/g, "")) || 0;
          var tax = parseFloat(taxPkrs[i].value.replace(/,/g, "")) || 0;
          grandTotal += pkr + tax;

          var qty = itemQtys[i].value;
          var unitP = itemPrices[i].value;
          var usdTotal = qty && unitP ? "$" + qty * unitP : "-";

          tableHTML +=
            "<tr><td>" +
            itemNames[i].value +
            "</td><td>" +
            itemDates[i].value +
            "</td><td>" +
            qty +
            "</td><td>$" +
            unitP +
            "</td><td>" +
            usdTotal +
            "</td><td>PKR " +
            itemPkrs[i].value +
            "</td></tr><tr><td>" +
            taxNames[i].value +
            "</td><td>" +
            itemDates[i].value +
            "</td><td>-</td><td>-</td><td>-</td><td>PKR " +
            taxPkrs[i].value +
            "</td></tr>";
        }

        var grandTotalFormatted = grandTotal.toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
        document.getElementById("previewGrandTotal").innerText =
          grandTotalFormatted;
        document.getElementById("inputGrandTotal").value = grandTotalFormatted;
        document.getElementById("previewTableBody").innerHTML = tableHTML;

        var slipFiles = document.getElementsByClassName("slip-file");
        var slipsGrid = document.getElementById("previewSlipsGrid");
        slipsGrid.innerHTML = "";

        for (var j = 0; j < slipFiles.length; j++) {
          var file = slipFiles[j].files[0];
          if (file) {
            var reader = new FileReader();
            var card = document.createElement("div");
            card.className = "slip-image-wrapper";
            card.innerHTML = "<span>Loading Image...</span>";
            slipsGrid.appendChild(card);

            (function (targetCard, currentReader) {
              currentReader.onload = function (e) {
                targetCard.innerHTML = "";
                var img = document.createElement("img");
                img.src = e.target.result;
                img.alt = "Transaction Slip";
                targetCard.appendChild(img);
              };
            })(card, reader);

            reader.readAsDataURL(file);
          }
        }
      }

      window.onload = updateInvoice;
    </script>
  </body>
</html>
